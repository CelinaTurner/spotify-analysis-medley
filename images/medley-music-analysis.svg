<svg viewBox="0 0 1100 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="4" y="4" width="1092" height="432" rx="14" fill="#0a111d" stroke="#1e293b" stroke-width="1.5"/>

  <!-- title -->
  <text x="36" y="44" font-size="22" font-weight="700" fill="#e2e8f0">Medley of Music Analysis</text>
  <text x="36" y="66" font-size="13" fill="#7e93a8">Spotify audio features · 1900–2021 · ~586k tracks · 20 features · Python</text>

  <!-- equalizer motif (top right) -->
  <g>
    <rect x="900" y="50" width="7" height="14" rx="2" fill="#7c3aed"/>
    <rect x="914" y="38" width="7" height="26" rx="2" fill="#9333ea"/>
    <rect x="928" y="46" width="7" height="18" rx="2" fill="#a21caf"/>
    <rect x="942" y="30" width="7" height="34" rx="2" fill="#c026d3"/>
    <rect x="956" y="42" width="7" height="22" rx="2" fill="#db2777"/>
    <rect x="970" y="34" width="7" height="30" rx="2" fill="#ec4899"/>
    <rect x="984" y="52" width="7" height="12" rx="2" fill="#f0606b"/>
    <rect x="998" y="36" width="7" height="28" rx="2" fill="#f4843c"/>
    <rect x="1012" y="44" width="7" height="20" rx="2" fill="#f59e0b"/>
    <rect x="1026" y="32" width="7" height="32" rx="2" fill="#f4c542"/>
    <rect x="1040" y="48" width="7" height="16" rx="2" fill="#fbbf24"/>
  </g>

  <!-- stage boxes -->
  <!-- Dataset -->
  <rect x="40" y="150" width="165" height="150" rx="10" fill="#0f1a27" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="122.5" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#a78bfa">Dataset</text>
  <text x="122.5" y="214" text-anchor="middle" font-size="11.5" fill="#8aa0b6">Spotify tracks.csv</text>
  <text x="122.5" y="232" text-anchor="middle" font-size="11.5" fill="#8aa0b6">~586,672 rows</text>
  <text x="122.5" y="250" text-anchor="middle" font-size="11.5" fill="#8aa0b6">20 audio features</text>

  <!-- Clean & Explore -->
  <rect x="240" y="150" width="165" height="150" rx="10" fill="#0f1a27" stroke="#9333ea" stroke-width="1.6"/>
  <text x="322.5" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#c084fc">Clean &amp; Explore</text>
  <text x="322.5" y="214" text-anchor="middle" font-size="11.5" fill="#8aa0b6">drop nulls · cardinality</text>
  <text x="322.5" y="232" text-anchor="middle" font-size="11.5" fill="#8aa0b6">most prolific artists</text>
  <text x="322.5" y="250" text-anchor="middle" font-size="11.5" fill="#8aa0b6">popularity ranking</text>

  <!-- Correlation -->
  <rect x="440" y="150" width="165" height="150" rx="10" fill="#0f1a27" stroke="#c026d3" stroke-width="1.6"/>
  <text x="522.5" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#e879f9">Correlation</text>
  <text x="522.5" y="214" text-anchor="middle" font-size="11.5" fill="#8aa0b6">feature heatmap</text>
  <text x="522.5" y="232" text-anchor="middle" font-size="11.5" fill="#8aa0b6">loudness↔energy 0.77</text>
  <text x="522.5" y="250" text-anchor="middle" font-size="11.5" fill="#8aa0b6">valence↔dance 0.53</text>

  <!-- K-Means -->
  <rect x="640" y="150" width="165" height="150" rx="10" fill="#0f1a27" stroke="#ec4899" stroke-width="1.6"/>
  <text x="722.5" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#f472b6">K-Means</text>
  <text x="722.5" y="214" text-anchor="middle" font-size="11.5" fill="#8aa0b6">z-score · Elbow → k=8</text>
  <text x="722.5" y="232" text-anchor="middle" font-size="11.5" fill="#8aa0b6">PCA → 2D</text>
  <text x="722.5" y="250" text-anchor="middle" font-size="11.5" fill="#8aa0b6">silhouette ≈ 0.15</text>

  <!-- Takeaway -->
  <rect x="840" y="150" width="220" height="150" rx="10" fill="#0f1a27" stroke="#f4843c" stroke-width="1.6"/>
  <text x="950" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#fb923c">Takeaway</text>
  <text x="950" y="210" text-anchor="middle" font-size="11.5" fill="#8aa0b6">clusters overlap —</text>
  <text x="950" y="228" text-anchor="middle" font-size="11.5" fill="#8aa0b6">audio features alone</text>
  <text x="950" y="246" text-anchor="middle" font-size="11.5" fill="#8aa0b6">don't fully separate</text>
  <text x="950" y="264" text-anchor="middle" font-size="11.5" fill="#8aa0b6">songs</text>

  <!-- flow arrows -->
  <line x1="207" y1="225" x2="235" y2="225" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="407" y1="225" x2="435" y2="225" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="607" y1="225" x2="635" y2="225" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="807" y1="225" x2="835" y2="225" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- footer -->
  <text x="36" y="352" font-size="11.5" fill="#6b7f93">Exploratory analysis + unsupervised K-Means clustering of a century of Spotify audio features.</text>
  <text x="36" y="370" font-size="11.5" fill="#6b7f93">The weak cluster separation (silhouette ≈ 0.15) is itself the finding — audio features alone don't cleanly classify songs.</text>
</svg>
